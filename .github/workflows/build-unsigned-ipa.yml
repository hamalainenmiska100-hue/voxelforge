name: Build Unsigned IPA

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build unsigned archive
        run: |
          set -euo pipefail

          xcodebuild \
            -project VoxelForge.xcodeproj \
            -scheme VoxelForge \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/VoxelForge.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        run: |
          set -euo pipefail

          APP_PATH="build/VoxelForge.xcarchive/Products/Applications/VoxelForge.app"
          PAYLOAD_DIR="build/Payload"
          IPA_PATH="build/VoxelForge-unsigned.ipa"

          test -d "$APP_PATH"

          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/VoxelForge.app"

          (
            cd build
            /usr/bin/zip -qry "VoxelForge-unsigned.ipa" Payload
          )

          test -f "$IPA_PATH"
          echo "Built IPA at $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxelForge-unsigned-ipa
          path: build/VoxelForge-unsigned.ipa
          if-no-files-found: error
